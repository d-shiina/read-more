<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="kb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2040"/>
      <stop offset="1" stop-color="#171126"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb3d1"/>
      <stop offset="1" stop-color="#c86fa6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#kb)"/>
  <!-- placeholder anime-ish avatar -->
  <g>
    <!-- hair back -->
    <path d="M96 210 q-8 -140 104 -150 q112 10 104 150 q6 60 -12 120 h-184 q-18 -60 -12 -120z" fill="url(#hair)"/>
    <!-- face -->
    <ellipse cx="200" cy="215" rx="78" ry="88" fill="#ffe6d8"/>
    <!-- bangs -->
    <path d="M122 190 q10 -70 78 -72 q68 2 78 72 q-30 -34 -78 -30 q-48 -4 -78 30z" fill="url(#hair)"/>
    <!-- eyes -->
    <ellipse cx="170" cy="220" rx="13" ry="18" fill="#5a3b7a"/>
    <ellipse cx="230" cy="220" rx="13" ry="18" fill="#5a3b7a"/>
    <circle cx="174" cy="214" r="4" fill="#fff"/>
    <circle cx="234" cy="214" r="4" fill="#fff"/>
    <!-- blush -->
    <ellipse cx="152" cy="250" rx="14" ry="8" fill="#ffb3c2" opacity="0.7"/>
    <ellipse cx="248" cy="250" rx="14" ry="8" fill="#ffb3c2" opacity="0.7"/>
    <!-- mouth -->
    <path d="M188 262 q12 12 24 0" stroke="#c86f8a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- headset (netgame!) -->
    <path d="M112 200 q88 -120 176 0" stroke="#4be3ff" stroke-width="10" fill="none" stroke-linecap="round"/>
    <rect x="100" y="196" width="26" height="40" rx="8" fill="#4be3ff"/>
    <rect x="274" y="196" width="26" height="40" rx="8" fill="#4be3ff"/>
    <path d="M126 236 q-24 30 4 58" stroke="#4be3ff" stroke-width="6" fill="none"/>
    <circle cx="132" cy="298" r="8" fill="#4be3ff"/>
  </g>
  <text x="200" y="380" text-anchor="middle" fill="#a99fc9" font-size="20" font-family="sans-serif">こなちゃん（仮）</text>
</svg>
